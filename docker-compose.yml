services:
  hw-spec-collector:
    build:
      context: .
      dockerfile: Dockerfile
    image: dhg-hw-spec-collector:latest
    container_name: dhg-hw-spec-collector

    # ── Report config ─────────────────────────────────────────────────────────
    # REPORT_TYPE:   full | executive | gpu | storage | network | all
    # REPORT_FORMAT: html | markdown | both
    # SKIP_REPORT:   1 = CSV only, no report
    environment:
      REPORT_TYPE:   ${REPORT_TYPE:-full}
      REPORT_FORMAT: ${REPORT_FORMAT:-html}
      SKIP_REPORT:   ${SKIP_REPORT:-0}

    # ── Privileged access ─────────────────────────────────────────────────────
    privileged: true
    pid: host
    network_mode: host

    # ── Host hardware visibility ──────────────────────────────────────────────
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - ./output:/output

    restart: "no"
