name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y dmidecode lm-sensors pciutils

      - name: Install Python deps
        run: pip install psutil py-cpuinfo

      - name: Run schema tests
        run: python -m pytest tests/test_schema.py -v

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install psutil py-cpuinfo

      - name: Run schema tests
        run: python -m pytest tests/test_schema.py -v

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install psutil py-cpuinfo wmi pywin32

      - name: Run schema tests
        run: python -m pytest tests/test_schema.py -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dhg-hw-spec-collector:ci .

      - name: Verify image runs and produces CSV
        run: |
          mkdir -p output
          docker run --rm \
            -v $(pwd)/output:/output \
            dhg-hw-spec-collector:ci || true
          ls output/*.csv && echo "CSV confirmed" || echo "No CSV without privileged — build OK"
